<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sommeil</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
</head>
<body>
<main>

  <header>
    <h1>sommeil</h1>
    <p class="subtitle">calculez vos cycles</p>
  </header>

  <div class="content-row">

    <div class="col col-inputs">
      <section class="inputs">

        <div class="field-group">
          <p class="picker-title">heure de coucher</p>
          <div class="picker-shell glass-el">
            <div class="drum" id="bed-h" data-max="23" data-val="22"></div>
            <div class="colon">:</div>
            <div class="drum" id="bed-m" data-max="59" data-val="30"></div>
          </div>
        </div>

        <div class="field-group">
          <p class="picker-title">heure de réveil souhaitée</p>
          <div class="picker-shell glass-el">
            <div class="drum" id="wake-h" data-max="23" data-val="7"></div>
            <div class="colon">:</div>
            <div class="drum" id="wake-m" data-max="59" data-val="0"></div>
          </div>
        </div>

      </section>

      <section class="slider-section glass-el">
        <div class="slider-header">
          <label>temps d'endormissement</label>
          <span id="latency-display">10 min</span>
        </div>
        <div class="slider-wrap">
          <input type="range" id="latency" min="0" max="30" step="1" value="10"/>
          <div class="ticks">
            <span>0</span><span>5</span><span>10</span><span>15</span>
            <span>20</span><span>25</span><span>30</span>
          </div>
        </div>
      </section>

      <button id="calc-btn">
        <span>calculer</span>
        <span class="moon">◐</span>
      </button>
    </div>

    <div class="col-divider"></div>

    <div class="col col-results">
      <div id="results-empty" class="results-empty">
        <span>🌙</span>
        <p>vos cycles apparaîtront ici</p>
      </div>
      <section id="results" class="results hidden">
        <div id="results-inner"></div>
      </section>
    </div>

  </div>

</main>
<script src="script.js"></script>
</body>
</html>
